<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Маркетинг ДКБИ</title>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<style>
:root {
  --bg: #0f172a;
  --bg-card: #1e293b;
  --bg-card2: #162032;
  --border: rgba(255,255,255,0.07);
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --accent: #3b82f6;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
  --purple: #a78bfa;
  --orange: #f97316;
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

/* HEADER */
.header { padding: 20px 24px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.header-left h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.header-left p { color: var(--text2); font-size: 13px; margin-top: 2px; }
.period-tabs { display: flex; gap: 4px; background: var(--bg-card2); border-radius: 10px; padding: 4px; }
.period-tab { padding: 5px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text2); border: none; background: none; transition: all 0.2s; }
.period-tab.active { background: var(--accent); color: #fff; }

/* MAIN LAYOUT */
.main { padding: 20px 24px; display: grid; gap: 16px; }

/* KPI STRIP */
.kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
@media (max-width: 1100px) { .kpi-row { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 700px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } }

.kpi-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; position: relative; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
.kpi-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
.kpi-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin-bottom: 8px; }
.kpi-value { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
.kpi-delta { font-size: 12px; font-weight: 600; }
.kpi-delta.pos { color: var(--green); }
.kpi-delta.neg { color: var(--red); }
.kpi-delta.neu { color: var(--text3); }
.kpi-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* CHARTS ROW */
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 900px) { .charts-row { grid-template-columns: 1fr; } }
.chart-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
.chart-card.wide { grid-column: 1 / -1; }
.chart-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }

/* BOTTOM ROW */
.bottom-row { display: grid; grid-template-columns: 1.4fr 1fr; gap: 12px; }
@media (max-width: 900px) { .bottom-row { grid-template-columns: 1fr; } }

/* TABLE */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { text-align: left; padding: 8px 10px; color: var(--text3); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
.data-table td { padding: 9px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.data-table tr:hover td { background: rgba(255,255,255,0.03); }
.data-table tr:last-child td { border-bottom: none; }
.bar-wrap { display: flex; align-items: center; gap: 8px; }
.bar-bg { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; }
.bar-fill { height: 4px; background: var(--accent); border-radius: 2px; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.tag.g { background: rgba(34,197,94,0.15); color: var(--green); }
.tag.y { background: rgba(234,179,8,0.15); color: var(--yellow); }
.tag.r { background: rgba(239,68,68,0.15); color: var(--red); }

/* LOADER */
#loader { display: flex; align-items: center; justify-content: center; height: 80vh; flex-direction: column; gap: 12px; color: var(--text2); font-size: 14px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <span>Загрузка данных…</span>
</div>

<div id="app" style="display:none">
  <div class="header">
    <div class="header-left">
      <h1>📊 Маркетинг ДКБИ</h1>
      <p id="hdr-period">—</p>
    </div>
    <div class="period-tabs" id="period-tabs"></div>
  </div>
  <div class="main">
    <div class="kpi-row" id="kpi-row"></div>
    <div class="charts-row">
      <div class="chart-card wide">
        <div class="chart-title">Лиды и расход по неделям</div>
        <div id="chart-trend"></div>
      </div>
    </div>
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Лиды по источникам</div>
        <div id="chart-sources"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Сделки по направлениям</div>
        <div id="chart-categories"></div>
      </div>
    </div>
    <div class="bottom-row">
      <div class="chart-card">
        <div class="chart-title">Источники — детализация</div>
        <table class="data-table" id="tbl-sources"></table>
      </div>
      <div class="chart-card">
        <div class="chart-title">Каналы расхода</div>
        <div id="chart-spend"></div>
      </div>
    </div>
  </div>
</div>

<script>
const fmt = (n, opts = {}) => new Intl.NumberFormat('ru-RU', opts).format(Math.round(n));
const fmtM = n => n >= 1e6 ? (n/1e6).toFixed(1) + ' млн' : n >= 1e3 ? (n/1e3).toFixed(0) + ' тыс' : fmt(n);
const fmtR = n => fmtM(n) + ' ₽';
const pct = (a, b) => b ? ((a - b) / b * 100) : null;
const sign = v => v > 0 ? '+' : '';
const deltaClass = (v, inv = false) => v === null ? 'neu' : (inv ? (v > 0 ? 'neg' : 'pos') : (v > 0 ? 'pos' : 'neg'));

let DATA = null;
let activeWeekIdx = null;
let charts = {};

// --- Load data ---
async function loadData() {
  const resp = await fetch('marketing-data.json?t=' + Date.now());
  DATA = await resp.json();
}

// --- Render KPI ---
function renderKPI(week, prev) {
  const el = document.getElementById('kpi-row');
  const dp = (curr, prevVal, inv = false) => {
    if (prevVal == null || prevVal === 0) return '<span class="kpi-delta neu">—</span>';
    const v = pct(curr, prevVal);
    return `<span class="kpi-delta ${deltaClass(v, inv)}">${sign(v)}${v.toFixed(1)}% к пред.</span>`;
  };

  const cards = [
    {
      label: 'Маркет. лиды',
      value: fmt(week.leads.marketing || 0),
      delta: dp(week.leads.marketing, prev?.leads?.marketing),
      sub: `Всего: ${fmt(week.leads.total || 0)}`
    },
    {
      label: 'CPL',
      value: week.cpl ? fmt(week.cpl) + ' ₽' : '—',
      delta: dp(week.cpl, prev?.cpl, true),
      sub: 'стоимость лида'
    },
    {
      label: 'Расход',
      value: fmtR(week.spend.total || 0),
      delta: dp(week.spend.total, prev?.spend?.total, true),
      sub: `Директ: ${fmtR(week.spend.direct || 0)}`
    },
    {
      label: 'Визиты',
      value: fmt(week.metrika.visits || 0),
      delta: dp(week.metrika.visits, prev?.metrika?.visits),
      sub: `Отказы: ${(week.metrika.bounceRate || 0).toFixed(1)}%`
    },
    {
      label: 'Выиграно ₽',
      value: fmtR(week.deals.wonSum || 0),
      delta: dp(week.deals.wonSum, prev?.deals?.wonSum),
      sub: `Сделок: ${fmt(week.deals.won || 0)}`
    },
  ];

  el.innerHTML = cards.map(c => `
    <div class="kpi-card">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value">${c.value}</div>
      ${c.delta}
      <div class="kpi-sub">${c.sub}</div>
    </div>
  `).join('');
}

// --- Trend chart ---
function renderTrend(weeks) {
  if (charts.trend) { charts.trend.destroy(); delete charts.trend; }
  const labels = weeks.map(w => w.label);
  const leads = weeks.map(w => w.leads.marketing || 0);
  const spend = weeks.map(w => Math.round((w.spend.total || 0) / 1000));
  const cpl = weeks.map(w => w.cpl || 0);

  charts.trend = new ApexCharts(document.getElementById('chart-trend'), {
    chart: { type: 'line', height: 260, background: 'transparent', toolbar: { show: false }, animations: { speed: 400 } },
    series: [
      { name: 'Лиды', type: 'bar', data: leads },
      { name: 'Расход, тыс ₽', type: 'line', data: spend },
      { name: 'CPL', type: 'line', data: cpl },
    ],
    xaxis: { categories: labels, labels: { style: { colors: '#64748b', fontSize: '11px' } }, axisBorder: { show: false }, axisTicks: { show: false } },
    yaxis: [
      { title: { text: '' }, labels: { style: { colors: '#64748b' }, formatter: v => fmt(v) }, min: 0 },
      { opposite: true, title: { text: '' }, labels: { style: { colors: '#64748b' }, formatter: v => v + 'k₽' }, min: 0 },
      { show: false, min: 0 },
    ],
    stroke: { curve: 'smooth', width: [0, 2, 2] },
    fill: { type: ['solid', 'solid', 'solid'], opacity: [0.8, 1, 1] },
    colors: ['#3b82f6', '#f97316', '#a78bfa'],
    plotOptions: { bar: { borderRadius: 4, columnWidth: '50%' } },
    grid: { borderColor: 'rgba(255,255,255,0.05)', strokeDashArray: 4 },
    tooltip: {
      theme: 'dark',
      y: [
        { formatter: v => fmt(v) + ' лидов' },
        { formatter: v => fmt(v) + ' тыс ₽' },
        { formatter: v => fmt(v) + ' ₽/лид' },
      ]
    },
    legend: { labels: { colors: '#94a3b8' }, position: 'top', horizontalAlign: 'right' },
    theme: { mode: 'dark' },
  });
  charts.trend.render();
}

// --- Sources donut ---
function renderSources(week) {
  if (charts.sources) { charts.sources.destroy(); delete charts.sources; }
  const src = week.bySource || {};
  const entries = Object.entries(src).sort((a, b) => b[1] - a[1]).slice(0, 8);
  if (!entries.length) { document.getElementById('chart-sources').innerHTML = '<p style="color:var(--text3);text-align:center;padding:40px 0">Нет данных</p>'; return; }

  charts.sources = new ApexCharts(document.getElementById('chart-sources'), {
    chart: { type: 'donut', height: 260, background: 'transparent' },
    series: entries.map(e => e[1]),
    labels: entries.map(e => e[0]),
    colors: ['#3b82f6','#22c55e','#f97316','#a78bfa','#eab308','#ef4444','#06b6d4','#ec4899'],
    legend: { position: 'bottom', labels: { colors: '#94a3b8' }, fontSize: '11px', itemMargin: { horizontal: 6 } },
    dataLabels: { enabled: true, style: { fontSize: '11px' }, dropShadow: { enabled: false } },
    plotOptions: { pie: { donut: { size: '60%', labels: { show: true, total: { show: true, label: 'Всего', color: '#94a3b8', formatter: w => fmt(w.globals.seriesTotals.reduce((a,b)=>a+b,0)) } } } } },
    stroke: { width: 0 },
    theme: { mode: 'dark' },
    tooltip: { theme: 'dark' },
  });
  charts.sources.render();
}

// --- Categories bar ---
function renderCategories(week) {
  if (charts.cats) { charts.cats.destroy(); delete charts.cats; }
  const cats = week.byCategory || {};
  const entries = Object.entries(cats).sort((a, b) => b[1] - a[1]).slice(0, 8);
  if (!entries.length) { document.getElementById('chart-categories').innerHTML = '<p style="color:var(--text3);text-align:center;padding:40px 0">Нет данных</p>'; return; }

  charts.cats = new ApexCharts(document.getElementById('chart-categories'), {
    chart: { type: 'bar', height: 260, background: 'transparent', toolbar: { show: false } },
    series: [{ name: 'Сделки', data: entries.map(e => e[1]) }],
    xaxis: { categories: entries.map(e => e[0].replace(/ \(#\d+\)/, '')), labels: { style: { colors: '#64748b', fontSize: '11px' } }, axisBorder: { show: false }, axisTicks: { show: false } },
    yaxis: { labels: { style: { colors: '#64748b' } } },
    colors: ['#22c55e'],
    plotOptions: { bar: { horizontal: true, borderRadius: 4, barHeight: '55%' } },
    dataLabels: { enabled: true, style: { fontSize: '11px' } },
    grid: { borderColor: 'rgba(255,255,255,0.05)', xaxis: { lines: { show: true } }, yaxis: { lines: { show: false } } },
    theme: { mode: 'dark' },
    tooltip: { theme: 'dark' },
  });
  charts.cats.render();
}

// --- Spend donut ---
function renderSpend(week) {
  if (charts.spend) { charts.spend.destroy(); delete charts.spend; }
  const s = week.spend;
  const items = [
    { label: 'Яндекс.Директ', val: s.direct || 0 },
    { label: 'Яндекс.Бизнес', val: s.business || 0 },
    { label: '2ГИС', val: s.twogis || 0 },
  ].filter(i => i.val > 0);

  if (!items.length) { document.getElementById('chart-spend').innerHTML = '<p style="color:var(--text3);text-align:center;padding:40px 0">Нет данных</p>'; return; }

  charts.spend = new ApexCharts(document.getElementById('chart-spend'), {
    chart: { type: 'donut', height: 260, background: 'transparent' },
    series: items.map(i => Math.round(i.val)),
    labels: items.map(i => i.label),
    colors: ['#3b82f6', '#eab308', '#22c55e'],
    legend: { position: 'bottom', labels: { colors: '#94a3b8' }, fontSize: '12px' },
    dataLabels: { enabled: true, formatter: (val, opts) => opts.w.globals.series[opts.seriesIndex] >= 1000 ? fmtR(opts.w.globals.series[opts.seriesIndex]) : val.toFixed(0) + '%', style: { fontSize: '11px' }, dropShadow: { enabled: false } },
    plotOptions: { pie: { donut: { size: '55%', labels: { show: true, total: { show: true, label: 'Расход', color: '#94a3b8', formatter: w => fmtR(w.globals.seriesTotals.reduce((a,b)=>a+b,0)) } } } } },
    stroke: { width: 0 },
    theme: { mode: 'dark' },
    tooltip: { theme: 'dark', y: { formatter: v => fmtR(v) } },
  });
  charts.spend.render();
}

// --- Sources table ---
function renderSourcesTable(week) {
  const src = week.bySource || {};
  const total = Object.values(src).reduce((a, b) => a + b, 0);
  const entries = Object.entries(src).sort((a, b) => b[1] - a[1]);
  const max = entries[0]?.[1] || 1;

  const table = document.getElementById('tbl-sources');
  table.innerHTML = `
    <thead><tr><th>Источник</th><th>Лидов</th><th>Доля</th><th></th></tr></thead>
    <tbody>
      ${entries.map(([src, cnt]) => {
        const share = total > 0 ? (cnt / total * 100) : 0;
        const barW = (cnt / max * 100).toFixed(0);
        const tag = share > 20 ? 'g' : share > 8 ? 'y' : 'r';
        return `<tr>
          <td>${src}</td>
          <td>${fmt(cnt)}</td>
          <td><span class="tag ${tag}">${share.toFixed(0)}%</span></td>
          <td style="width:100px"><div class="bar-bg"><div class="bar-fill" style="width:${barW}%"></div></div></td>
        </tr>`;
      }).join('')}
    </tbody>
  `;
}

// --- Period tabs ---
function renderTabs(weeks) {
  const el = document.getElementById('period-tabs');
  el.innerHTML = weeks.map((w, i) =>
    `<button class="period-tab ${i === activeWeekIdx ? 'active' : ''}" onclick="selectWeek(${i})">${w.label}</button>`
  ).join('');
}

function selectWeek(idx) {
  activeWeekIdx = idx;
  const week = DATA.weeks[idx];
  const prev = idx > 0 ? DATA.weeks[idx - 1] : null;

  document.getElementById('hdr-period').textContent = `${week.from} — ${week.to} · обновлено ${new Date(DATA.generatedAt).toLocaleDateString('ru-RU')}`;
  renderTabs(DATA.weeks);
  renderKPI(week, prev);
  renderSources(week);
  renderCategories(week);
  renderSpend(week);
  renderSourcesTable(week);
}

// --- Trend always shows all weeks ---
function renderAll() {
  renderTrend(DATA.weeks);
  selectWeek(activeWeekIdx);
}

// --- Init ---
(async () => {
  try {
    await loadData();
    activeWeekIdx = DATA.weeks.length - 1;
    document.getElementById('loader').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderAll();
  } catch (e) {
    document.getElementById('loader').innerHTML = `<div style="color:var(--red)">Ошибка загрузки данных: ${e.message}</div>`;
  }
})();
</script>
</body>
</html>
